version: '3.9'

# Production overrides - use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  backend:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  db:
    deploy:
      resources:
        limits:
          memory: 1G
