version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:3000
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shopmart-net

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: shopmart
      DB_USER: root
      DB_PASS: rootpass
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3001
    networks:
      - shopmart-net
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shopmart
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shopmart-net

networks:
  shopmart-net:
    driver: bridge

volumes:
  mysql_data:
