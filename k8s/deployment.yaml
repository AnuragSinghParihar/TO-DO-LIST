apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopmart-backend
  labels:
    app: shopmart
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shopmart
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopmart
        component: backend
    spec:
      containers:
        - name: backend
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/shopmart/backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: shopmart-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopmart-frontend
  labels:
    app: shopmart
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopmart
      component: frontend
  template:
    metadata:
      labels:
        app: shopmart
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/shopmart/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
